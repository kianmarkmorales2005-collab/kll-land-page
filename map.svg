<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100">
  <defs>
    <style>
      .bg { fill: #121212; } 
      .bldg-border { stroke-width: 2; stroke-opacity: 0.3; }
      .text-header { font-family: 'Outfit', sans-serif; fill: #ffffff; text-anchor: middle; }
      .text-bldg { font-family: 'Outfit', sans-serif; fill: #ffffff; text-anchor: middle; font-weight: 600; font-size: 28px; }
      .legend-text { font-family: 'Outfit', sans-serif; fill: #cccccc; font-size: 14px; }
      
      /* Department Colors */
      .ccsb { fill: #104e8b; stroke: #104e8b; }
      .cba { fill: #0a5c4a; stroke: #0a5c4a; }
      .cca { fill: #7b3218; stroke: #7b3218; }
      .ccsa { fill: #483d8b; stroke: #483d8b; }
      .admin { fill: #8b5a00; stroke: #8b5a00; }
      .multi { fill: #4a4a4a; stroke: #4a4a4a; }
      .road { fill: #222222; }
    </style>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="15"/>

  <text x="400" y="60" class="text-header" font-size="24px" font-weight="600">ALL SESSIONS — Friday</text>
  <text x="400" y="90" class="text-header" font-size="16px" opacity="0.7">Kolehiyo ng Lungsod ng Lipa · Campus Map</text>

  <rect class="road" x="80" y="520" width="640" height="40" rx="5"/>
  <rect class="road" x="380" y="120" width="40" height="780" rx="5"/>
  <rect class="road" x="80" y="820" width="640" height="40" rx="5"/>

  <rect class="multi bldg-border" x="160" y="120" width="130" height="150" rx="10"/>
  <text x="225" y="200" class="text-bldg" font-size="18px">MULTIPURPOSE</text>
  <text x="225" y="225" class="text-bldg" font-size="14px" opacity="0.6">BUILDING</text>

  <rect class="ccsb bldg-border" x="160" y="280" width="230" height="230" rx="15"/>
  <text x="275" y="405" class="text-bldg">CCS B</text>

  <rect class="cca bldg-border" x="420" y="280" width="230" height="230" rx="15"/>
  <text x="535" y="405" class="text-bldg">CCA</text>

  <rect class="cba bldg-border" x="160" y="580" width="230" height="230" rx="15"/>
  <text x="275" y="705" class="text-bldg">CBA</text>

  <rect class="ccsa bldg-border" x="440" y="580" width="240" height="230" rx="15"/>
  <text x="560" y="705" class="text-bldg">CCS A</text>

  <rect class="admin bldg-border" x="680" y="580" width="90" height="230" rx="15"/>
  <text transform="translate(725, 695) rotate(-90)" class="text-bldg">ADMIN</text>

  <rect x="20" y="910" width="760" height="40" rx="10" fill="#1a1a1a"/>
  
  <rect x="40" y="922" width="15" height="15" rx="3" class="ccsb"/>
  <text x="65" y="934" class="legend-text">CCS B</text>

  <rect x="135" y="922" width="15" height="15" rx="3" class="cba"/>
  <text x="160" y="934" class="legend-text">CBA</text>

  <rect x="225" y="922" width="15" height="15" rx="3" class="cca"/>
  <text x="250" y="934" class="legend-text">CCA</text>

  <rect x="315" y="922" width="15" height="15" rx="3" class="ccsa"/>
  <text x="340" y="934" class="legend-text">CCS A</text>

  <rect x="415" y="922" width="15" height="15" rx="3" class="admin"/>
  <text x="440" y="934" class="legend-text">Admin</text>

  <rect x="505" y="922" width="15" height="15" rx="3" class="multi"/>
  <text x="530" y="934" class="legend-text">Multipurpose Bldg</text>

</svg>
